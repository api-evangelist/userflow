aid: userflow
name: Userflow
description: >
  Userflow is a product onboarding and adoption platform that enables product teams
  to build in-app guided flows, checklists, announcements, and NPS surveys without
  requiring engineering resources. The platform provides a REST API for managing users,
  tracking events, and organizing users into groups or companies from a back-end
  application. Userflow supports data synchronization via API keys with Bearer token
  authentication, allowing real-time user attribute updates and event tracking to
  power personalized onboarding experiences. The platform targets SaaS companies
  seeking to improve activation rates, feature adoption, and overall user retention
  through guided in-app engagement.
