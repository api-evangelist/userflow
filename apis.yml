apis:
  - aid: userflow:userflow-rest-api
    name: Userflow REST API
    description: >
      The Userflow REST API allows back-end applications to synchronize user data,
      track events, and manage groups or companies within the Userflow platform.
      It provides endpoints for creating, updating, and deleting users; listing and
      querying users with cursor-based pagination; posting custom events that trigger
      flow conditions; and managing group memberships. Authentication uses Bearer
      token API keys scoped per environment, configured under Settings in the Userflow
      dashboard. The API base URL is https://api.userflow.com and all payloads use JSON.
    humanURL: https://docs.userflow.com/docs/api
    baseURL: https://api.userflow.com
